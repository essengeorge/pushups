<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pushups Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #e0e6ff;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
        }

        .page {
            display: none;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.5s ease-in;
        }

        .page.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ============= AUTH PAGE ============= */
        .auth-page {
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0a0e27 100%);
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: rgba(15, 20, 45, 0.95);
            border: 2px solid #00ff88;
            border-radius: 15px;
            box-shadow: 
                0 0 20px rgba(0, 255, 136, 0.3),
                0 0 40px rgba(0, 255, 136, 0.15),
                inset 0 0 20px rgba(0, 255, 136, 0.05);
            backdrop-filter: blur(10px);
        }

        .auth-title {
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .auth-subtitle {
            text-align: center;
            color: #a0a8ff;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00ff88;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 255, 136, 0.05);
            border: 1.5px solid #00ff88;
            border-radius: 8px;
            color: #e0e6ff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            border-color: #00ffff;
        }

        .form-group input::placeholder {
            color: #5a6080;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            border-radius: 8px;
            color: #0a0e27;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .btn:hover {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .error {
            color: #ff3366;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            min-height: 20px;
        }

        .success {
            color: #00ff88;
            font-weight: 600;
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #a0a8ff;
        }

        .toggle-form button {
            background: none;
            border: none;
            color: #00ff88;
            cursor: pointer;
            font-weight: 700;
            text-decoration: underline;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .toggle-form button:hover {
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        /* ============= APP PAGE ============= */
        .app-page {
            flex-direction: column;
            background: linear-gradient(135deg, #0a0e27 0%, #0f1435 50%, #0a0e27 100%);
        }

        .header {
            background: rgba(15, 20, 45, 0.8);
            border-bottom: 2px solid #00ff88;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .header-title {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            text-align: right;
        }

        .user-label {
            font-size: 12px;
            color: #a0a8ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #currentUser {
            font-size: 16px;
            color: #00ff88;
            font-weight: 600;
        }

        .logout-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #ff3366, #ff6600);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
        }

        .logout-btn:hover {
            box-shadow: 0 0 25px rgba(255, 51, 102, 0.6);
            transform: translateY(-2px);
        }

        .content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            overflow-y: auto;
        }

        .panel {
            background: rgba(15, 20, 45, 0.6);
            border: 2px solid #00ccff;
            border-radius: 12px;
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 0 20px rgba(0, 204, 255, 0.2),
                inset 0 0 10px rgba(0, 204, 255, 0.05);
        }

        .panel.wide {
            grid-column: 1 / -1;
        }

        .panel-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: #00ccff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            border-bottom: 2px solid #00ccff;
            padding-bottom: 10px;
        }

        .pushups-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .pushups-input-group {
            display: flex;
            gap: 10px;
        }

        #pushupsCount {
            flex: 1;
            padding: 14px;
            background: rgba(0, 255, 136, 0.05);
            border: 2px solid #00ff88;
            border-radius: 8px;
            color: #e0e6ff;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            transition: all 0.3s ease;
        }

        #pushupsCount:focus {
            outline: none;
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            border-color: #00ffff;
        }

        #pushupsCount::placeholder {
            color: #5a6080;
        }

        .add-btn {
            padding: 14px 20px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            border-radius: 8px;
            color: #0a0e27;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            letter-spacing: 1px;
        }

        .add-btn:hover {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            transform: translateY(-2px);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        .stats-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-card {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .stat-label {
            font-size: 12px;
            color: #a0a8ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            color: #00ff88;
            font-weight: 700;
        }

        .leaderboard {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: rgba(0, 204, 255, 0.05);
            border-left: 3px solid #00ccff;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .leaderboard-item:hover {
            background: rgba(0, 204, 255, 0.15);
            transform: translateX(5px);
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.3);
        }

        .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 10px currentColor;
        }

        .leaderboard-name {
            flex: 1;
            font-weight: 600;
            color: #e0e6ff;
            font-size: 14px;
        }

        .leaderboard-count {
            font-size: 16px;
            font-weight: 700;
            color: #00ff88;
            min-width: 50px;
            text-align: right;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 10px;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 8px;
            font-weight: 600;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .message.success {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .message.error {
            background: rgba(255, 51, 102, 0.2);
            border: 2px solid #ff3366;
            color: #ff6699;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 255, 136, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00ff88, #00ccff);
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00ccff, #00ff88);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }

            .panel.wide {
                grid-column: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ============= AUTH PAGE ============= -->
        <div class="auth-page page active">
            <div class="auth-container">
                <div class="auth-title">⚡ PUSHUPS</div>
                <!-- LOGIN FORM -->
                <form id="loginForm" class="form active">
                    <div class="form-group">
                        <label for="loginUsername">Юзер</label>
                        <input type="text" id="loginUsername" placeholder="Введи никнейм" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Пароль</label>
                        <input type="password" id="loginPassword" placeholder="Введи пароль" required>
                    </div>
                    <button type="submit" class="btn">Войти</button>
                    <div id="loginError" class="error"></div>
                </form>

                <!-- REGISTER FORM -->
                <form id="registerForm" class="form">
                    <div class="form-group">
                        <label for="registerUsername">Юзер</label>
                        <input type="text" id="registerUsername" placeholder="Выбери никнейм" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Пароль</label>
                        <input type="password" id="registerPassword" placeholder="Придумай пароль" required>
                    </div>
                    <button type="submit" class="btn">Создать</button>
                    <div id="registerError" class="error"></div>
                </form>

                <div class="toggle-form">
                    <span id="toggleText">Нет аккаунта? </span>
                    <button type="button" id="toggleBtn">Создать</button>
                </div>
            </div>
        </div>

        <!-- ============= APP PAGE ============= -->
        <div class="app-page page">
            <!-- HEADER -->
            <div class="header">
                <div class="header-title">⚡ PUSHUPS TRACKER</div>
                <div class="header-user">
                    <div class="user-info">
                        <div class="user-label">Пользователь</div>
                        <div id="currentUser">-</div>
                    </div>
                    <button class="logout-btn" onclick="logout()">Выход</button>
                </div>
            </div>

            <!-- CONTENT -->
            <div class="content">
                <!-- PUSHUPS INPUT PANEL -->
                <div class="panel">
                    <div class="panel-title">💪 Добавить отжимания</div>
                    <div class="pushups-section">
                        <div class="pushups-input-group">
                            <input type="number" id="pushupsCount" placeholder="10" min="1" value="10">
                            <button class="add-btn" onclick="addPushups()">Добавить</button>
                        </div>
                        <div class="stats-display">
                            <div class="stat-card">
                                <div class="stat-label">Вчера</div>
                                <div class="stat-value">0</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Сегодня</div>
                                <div class="stat-value">0</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- LEADERBOARD PANEL -->
                <div class="panel">
                    <div class="panel-title">🏆 Лидеры</div>
                    <div id="leaderboard" class="leaderboard"></div>
                </div>

                <!-- CHART PANEL -->
                <div class="panel wide">
                    <div class="panel-title">📊 График прогресса</div>
                    <div class="chart-container">
                        <canvas id="statsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MESSAGE NOTIFICATION -->
    <div id="message" class="message"></div>
    <script src="script.js"></script>
</body>
</html>
